<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 圓角琥珀色背景 -->
  <rect width="32" height="32" rx="7" fill="#d97706"/>
  <!-- 紙張主體 -->
  <rect x="8" y="6" width="16" height="20" rx="2" fill="#fcfaf6"/>
  <!-- 夾子 -->
  <rect x="12" y="4" width="8" height="3" rx="1" fill="#4a3728"/>
  <!-- 紙張上的水平線條 -->
  <line x1="11" y1="12" x2="21" y2="12" stroke="#8c7355" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="16" x2="21" y2="16" stroke="#8c7355" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="20" x2="17" y2="20" stroke="#8c7355" stroke-width="2" stroke-linecap="round"/>
</svg>
