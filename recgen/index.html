<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紀錄產生器原型 (Vue 3 重構版)</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <!-- 引入 Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Google Fonts: Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #fcfaf6;
            --bg-card: #ffffff;
            --text-main: #4a3728;
            --text-muted: #8c7355;
            --primary: #d97706;
            --primary-hover: #b45309;
            --primary-light: #fef3c7;
            --accent: #ca8a04;
            --border: #f1ebd9;
            --shadow: 0 10px 25px -5px rgba(217, 119, 6, 0.08), 0 8px 10px -6px rgba(217, 119, 6, 0.04);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* 導覽列 */
        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            transition: var(--transition);
            align-self: flex-start;
        }
        .nav-back:hover {
            color: var(--primary);
            transform: translateX(-4px);
        }

        /* 標題區 */
        .header {
            text-align: center;
            margin-bottom: 10px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-hover);
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
        }
        .header p {
            font-size: 18px;
            color: var(--text-muted);
            margin: 0;
        }

        /* 結果展示卡片：溫暖配色與柔和陰影 */
        .result-card {
            background-color: var(--bg-card);
            border: 2px solid var(--primary-light);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, var(--primary), var(--accent));
        }
        .result-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .result-text {
            font-size: 22px;
            font-weight: 500;
            line-height: 1.8;
            color: var(--text-main);
            margin: 0;
            white-space: pre-line;
            border-left: 4px solid var(--primary-light);
            padding-left: 20px;
        }

        /* 動作按鈕區 */
        .actions-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .btn {
            font-family: inherit;
            font-size: 18px;
            font-weight: 700;
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .btn-primary {
            background-color: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(217, 119, 6, 0.3);
        }
        .btn-secondary {
            background-color: var(--primary-light);
            color: var(--primary-hover);
        }
        .btn-secondary:hover {
            background-color: #fde68a;
            transform: translateY(-2px);
        }
        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--border);
            color: var(--text-muted);
        }
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: var(--bg-main);
        }

        /* 選擇面板網格 */
        .control-panel {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }
        .category-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        .category-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 16px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid var(--bg-main);
            padding-bottom: 8px;
        }
        .category-title span {
            color: var(--primary);
        }

        /* 標籤晶片按鈕 (自訂 Radio / Checkbox 樣式) */
        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .chip-label {
            position: relative;
            cursor: pointer;
        }
        .chip-label input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        .chip-text {
            display: inline-block;
            font-size: 18px;
            font-weight: 500;
            padding: 8px 18px;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text-main);
            transition: var(--transition);
        }
        /* Hover 狀態 */
        .chip-label:hover .chip-text {
            background-color: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary-hover);
        }
        /* 選取選中狀態 */
        .chip-label input:checked + .chip-text {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(217, 119, 6, 0.25);
            transform: scale(1.03);
        }

        /* 複製提示訊息 */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background-color: rgba(67, 20, 7, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 頁尾 */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 返回按鈕 -->
        <a href="../" class="nav-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            返回首頁
        </a>

        <!-- 標頭區 -->
        <header class="header">
            <h1>📝 紀錄產生器原型</h1>
            <p>使用 Vue 3 重新建構，簡化社工夥伴文書紀錄作業 (已擴充至 50 個選項)</p>
        </header>

        <!-- 結果展示區 -->
        <section class="result-card">
            <h2 class="result-title">
                <span>✨</span> 生成結果
            </h2>
            <div class="result-text" id="sentence-box">{{ generatedSentence }}</div>
            
            <div class="actions-bar">
                <button @click="randomizeAll" class="btn btn-primary">
                    <span>🎲</span> 一鍵隨機生成
                </button>
                <button @click="generateSentence" class="btn btn-secondary">
                    <span>✍️</span> 產生組合字串
                </button>
                <button @click="copyToClipboard" class="btn btn-outline">
                    <span>📋</span> 複製結果
                </button>
            </div>
        </section>

        <!-- 選擇面板區 -->
        <section class="control-panel">
            <!-- 人名 -->
            <div class="category-card">
                <h3 class="category-title"><span>👤</span> 人名 (50項)</h3>
                <div class="chips-container">
                    <label v-for="name in names" :key="name" class="chip-label">
                        <input type="radio" v-model="selectedName" :value="name" @change="generateSentence">
                        <span class="chip-text">{{ name }}</span>
                    </label>
                </div>
            </div>

            <!-- 地方 -->
            <div class="category-card">
                <h3 class="category-title"><span>📍</span> 地方 (50項)</h3>
                <div class="chips-container">
                    <label v-for="place in places" :key="place" class="chip-label">
                        <input type="radio" v-model="selectedPlace" :value="place" @change="generateSentence">
                        <span class="chip-text">{{ place }}</span>
                    </label>
                </div>
            </div>

            <!-- 行為 (複選) -->
            <div class="category-card">
                <h3 class="category-title"><span>🏃</span> 行為 (50項，可複選)</h3>
                <div class="chips-container">
                    <label v-for="action in actions" :key="action" class="chip-label">
                        <input type="checkbox" v-model="selectedActions" :value="action" @change="generateSentence">
                        <span class="chip-text">{{ action }}</span>
                    </label>
                </div>
            </div>

            <!-- 學校 -->
            <div class="category-card">
                <h3 class="category-title"><span>🏫</span> 學校 (50項)</h3>
                <div class="chips-container">
                    <label v-for="school in schools" :key="school" class="chip-label">
                        <input type="radio" v-model="selectedSchool" :value="school" @change="generateSentence">
                        <span class="chip-text">{{ school }}</span>
                    </label>
                </div>
            </div>

            <!-- 科系 -->
            <div class="category-card">
                <h3 class="category-title"><span>🎓</span> 科系 (50項)</h3>
                <div class="chips-container">
                    <label v-for="dept in depts" :key="dept" class="chip-label">
                        <input type="radio" v-model="selectedDept" :value="dept" @change="generateSentence">
                        <span class="chip-text">{{ dept }}</span>
                    </label>
                </div>
            </div>

            <!-- 學位 -->
            <div class="category-card">
                <h3 class="category-title"><span>📜</span> 學位 (50項)</h3>
                <div class="chips-container">
                    <label v-for="degree in degrees" :key="degree" class="chip-label">
                        <input type="radio" v-model="selectedDegree" :value="degree" @change="generateSentence">
                        <span class="chip-text">{{ degree }}</span>
                    </label>
                </div>
            </div>

            <!-- 驚嘆句 -->
            <div class="category-card">
                <h3 class="category-title"><span>💭</span> 驚嘆句 (50項)</h3>
                <div class="chips-container">
                    <label v-for="excl in excls" :key="excl" class="chip-label">
                        <input type="radio" v-model="selectedExcl" :value="excl" @change="generateSentence">
                        <span class="chip-text">{{ excl }}</span>
                    </label>
                </div>
            </div>
        </section>

        <!-- 複製成功的 Toast -->
        <div class="toast-msg" :class="{ show: showToast }">
            複製成功！已複製至剪貼簿。
        </div>

        <!-- 頁尾 -->
        <footer class="footer">
            <p>© 2026. Built with Vue 3.</p>
        </footer>
    </div>

                // 解析後的陣列
                const names = ref(txtNames.split(','));
                const schools = ref(txtSchools.split(','));
                const depts = ref(txtDepts.split(','));
                const degrees = ref(txtDegrees.split(','));
                const places = ref(txtPlaces.split(','));
                const actions = ref(txtActions.split(','));
                const excls = ref(txtExcls.split(','));

                // 選取的響應式變數
                const selectedName = ref('');
                const selectedSchool = ref('');
                const selectedDept = ref('');
                const selectedDegree = ref('');
                const selectedPlace = ref('');
                const selectedActions = ref([]);
                const selectedExcl = ref('');

                const generatedSentence = ref('請點擊「一鍵隨機生成」或從下方自訂項目！');
                const showToast = ref(false);

                // 隨機選取陣列中一個項目
                const getRandomItem = (arr) => {
                    return arr[Math.floor(Math.random() * arr.length)];
                };

                // 一鍵隨機選取
                const randomizeAll = () => {
                    selectedName.value = getRandomItem(names.value);
                    selectedSchool.value = getRandomItem(schools.value);
                    selectedDept.value = getRandomItem(depts.value);
                    selectedDegree.value = getRandomItem(degrees.value);
                    selectedPlace.value = getRandomItem(places.value);
                    selectedExcl.value = getRandomItem(excls.value);
                    
                    // 行為可隨機選取 1~3 個
                    const shuffled = [...actions.value].sort(() => 0.5 - Math.random());
                    selectedActions.value = shuffled.slice(0, Math.floor(Math.random() * 3) + 1);

                    generateSentence();
                };

                // 產生語句
                const generateSentence = () => {
                    const name = selectedName.value || '＿＿＿';
                    const place = selectedPlace.value || '＿＿＿';
                    const actionStr = selectedActions.value.length > 0 ? selectedActions.value.join('、') : '＿＿＿';
                    const school = selectedSchool.value || '＿＿＿';
                    const dept = selectedDept.value || '＿＿＿';
                    const degree = selectedDegree.value || '＿＿＿';
                    const excl = selectedExcl.value || '＿＿＿';

                    generatedSentence.value = `${name}，在${place}，${actionStr}。\n畢業於${school}${dept}，\n獲得${degree}。\n實在${excl}！`;
                };

                // 複製至剪貼簿
                const copyToClipboard = () => {
                    navigator.clipboard.writeText(generatedSentence.value).then(() => {

                        setTimeout(() => {
                            showToast.value = false;
                        }, 2000);
                    }).catch(err => {
                        console.error('複製失敗: ', err);
                    });
                };

                // 初始化載入
                onMounted(() => {
                    randomizeAll();
                });

                return {
                    names, schools, depts, degrees, places, actions, excls,
                    selectedName, selectedSchool, selectedDept, selectedDegree, selectedPlace, selectedActions, selectedExcl,
                    generatedSentence, showToast,
                    randomizeAll, generateSentence, copyToClipboard
                };
            }
        }).mount('#app');
